name: Validate Generated Files

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: latest

      - name: Build Example Site
        working-directory: exampleSite
        run: hugo --minify

      - name: Validate Generated Files
        uses: anishathalye/proof-html@v2.2.3
        with:
          directory: ./exampleSite/public
          check_css: true
          validator_ignore: katex|ontouch
          disable_external: true
          enforce_https: false
          check_favicon: false
          check_opengraph: false
